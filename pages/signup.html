<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFacture - Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .signup-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 45px 40px;
            max-width: 480px;
            width: 100%;
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(25px); } to { opacity:1; transform:translateY(0); } }
        .logo-block { text-align:center; margin-bottom:28px; }
        .logo-icon { width:62px; height:62px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:14px; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
        .logo-icon i { font-size:28px; color:white; }
        .logo-block h1 { font-size:24px; font-weight:800; color:#1a1a2e; margin-bottom:4px; }
        .logo-block p { color:#999; font-size:14px; }
        .form-label { font-weight:600; font-size:13px; color:#444; text-transform:uppercase; letter-spacing:0.4px; }
        .form-control { border:2px solid #e8e8e8; border-radius:10px; padding:11px 14px; font-size:15px; transition:all 0.25s; }
        .form-control:focus { border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.15); }
        .form-control.is-invalid { border-color:#e53935; }
        .error-box { display:none; background:#fff0f0; border:1.5px solid #ffcdd2; border-radius:10px; padding:13px 16px; margin-bottom:18px; color:#c62828; font-size:14px; align-items:flex-start; gap:10px; }
        .error-box.show { display:flex; }
        .success-box { display:none; background:#f1f8e9; border:1.5px solid #c5e1a5; border-radius:10px; padding:13px 16px; margin-bottom:18px; color:#2e7d32; font-size:14px; align-items:center; gap:10px; }
        .success-box.show { display:flex; }
        .btn-signup { background:linear-gradient(135deg,#667eea,#764ba2); border:none; border-radius:10px; padding:14px; font-weight:700; font-size:16px; width:100%; color:white; transition:all 0.3s; margin-top:6px; }
        .btn-signup:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(102,126,234,0.4); color:white; }
        .btn-signup:disabled { opacity:0.7; transform:none; }
        .link-login { display:block; text-align:center; color:#667eea; font-size:14px; margin-top:18px; text-decoration:none; }
        .link-login:hover { text-decoration:underline; }
        .footer-text { text-align:center; color:rgba(255,255,255,0.6); font-size:12px; margin-top:20px; }
    </style>
</head>
<body>
    <div>
        <div class="signup-card">
            <div class="logo-block">
                <div class="logo-icon"><i class="bi bi-person-plus"></i></div>
                <h1>Créer un compte</h1>
                <p>Rejoignez ProFacture gratuitement</p>
            </div>

            <div class="error-box" id="errorBox">
                <i class="bi bi-exclamation-circle"></i>
                <div id="errorText"></div>
            </div>
            <div class="success-box" id="successBox">
                <i class="bi bi-check-circle-fill"></i>
                <div id="successText"></div>
            </div>

            <form id="signupForm" novalidate>
                <div class="row mb-3">
                    <div class="col-md-6 mb-3 mb-md-0">
                        <label for="fullName" class="form-label">Nom complet</label>
                        <input type="text" class="form-control" id="fullName" placeholder="Jean Dupont" required>
                    </div>
                    <div class="col-md-6">
                        <label for="companyName" class="form-label">Entreprise</label>
                        <input type="text" class="form-control" id="companyName" placeholder="Ma Société" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Adresse e-mail</label>
                    <input type="email" class="form-control" id="email" placeholder="votre@email.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Mot de passe</label>
                    <div class="position-relative">
                        <input type="password" class="form-control" id="password" placeholder="Minimum 6 caractères" required>
                        <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y pe-3 text-muted" onclick="togglePwd('password','eye1')" style="border:none;background:none;">
                            <i class="bi bi-eye" id="eye1"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
                    <div class="position-relative">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Répétez votre mot de passe" required>
                        <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y pe-3 text-muted" onclick="togglePwd('confirmPassword','eye2')" style="border:none;background:none;">
                            <i class="bi bi-eye" id="eye2"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-signup" id="signupBtn">
                    <i class="bi bi-person-check me-2"></i>Créer mon compte
                </button>
            </form>
            <a href="login.html" class="link-login"><i class="bi bi-arrow-left me-1"></i>J'ai déjà un compte</a>
        </div>
        <p class="footer-text">© 2026 ProFacture. Tous droits réservés.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Pas de redirection automatique

        function togglePwd(id, iconId) {
            const el = document.getElementById(id);
            const icon = document.getElementById(iconId);
            el.type = el.type === 'password' ? 'text' : 'password';
            icon.className = el.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
        }
        function showError(msg) {
            document.getElementById('errorText').innerHTML = msg;
            document.getElementById('errorBox').classList.add('show');
            document.getElementById('successBox').classList.remove('show');
        }
        function showSuccess(msg) {
            document.getElementById('successText').innerHTML = msg;
            document.getElementById('successBox').classList.add('show');
            document.getElementById('errorBox').classList.remove('show');
        }
        function clearMessages() {
            document.getElementById('errorBox').classList.remove('show');
            document.getElementById('successBox').classList.remove('show');
        }

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            clearMessages();
            const fullName = document.getElementById('fullName').value.trim();
            const companyName = document.getElementById('companyName').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!fullName || !companyName || !email || !password || !confirmPassword) { showError('Veuillez remplir tous les champs.'); return; }
            if (password.length < 6) { showError('Le mot de passe doit contenir au moins 6 caractères.'); return; }
            if (password !== confirmPassword) { showError('Les mots de passe ne correspondent pas.'); return; }

            const accounts = JSON.parse(localStorage.getItem('pf_accounts') || '[]');
            if (accounts.find(a => a.email === email)) { showError(`Un compte existe déjà avec l'adresse <strong>${email}</strong>.`); return; }

            accounts.push({ fullName, companyName, email, password, createdAt: Date.now() });
            localStorage.setItem('pf_accounts', JSON.stringify(accounts));

            showSuccess('Compte créé avec succès ! Redirection vers la connexion...');
            const btn = document.getElementById('signupBtn');
            btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Compte créé !';
            btn.disabled = true;
            setTimeout(() => window.location.href = 'login.html', 1500);
        });
    </script>
</body>
</html>
