                    <li class="nav-item"><a class="nav-link active" href="clients.html"><i class="bi bi-people me-1"></i>Clients</a></li>

    <div class="container-fluid py-4">
        <div class="row mb-4">
            <div class="col-12 col-md-6">
                <h1 class="h3 fw-bold mb-1">Gestion des Clients</h1>
                <p class="text-muted">Gérez vos clients et leurs informations</p>
            </div>
            <div class="col-12 col-md-6 text-md-end">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addClientModal">
                    <i class="bi bi-plus-circle me-1"></i>Ajouter un Client
                </button>
            </div>
        </div>

        <div class="row mb-3 align-items-center">
            <div class="col-12 col-md-6">
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="Rechercher un client...">
                </div>
            </div>
            <div class="col-12 col-md-6 text-md-end mt-2 mt-md-0">
                <button class="btn btn-outline-danger" id="exportPdfBtn" onclick="exportClientsPDF()">
                    <i class="bi bi-file-earmark-pdf me-1"></i>Télécharger la liste (PDF)
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div id="clientsTable"></div>
            </div>
        </div>
    </div>

    <!-- Modal Ajouter Client -->
    <div class="modal fade" id="addClientModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Ajouter un Nouveau Client</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3"><label class="form-label fw-semibold">Nom / Entreprise *</label><input type="text" class="form-control" id="clientName" required></div>
                    <div class="mb-3"><label class="form-label fw-semibold">E-mail *</label><input type="email" class="form-control" id="clientEmail" required></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Téléphone *</label><input type="tel" class="form-control" id="clientPhone" placeholder="+237 6XX XXX XXX" required></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Adresse</label><textarea class="form-control" id="clientAddress" rows="2"></textarea></div>
                    <div id="addClientError" class="alert alert-danger d-none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" id="addClientBtn"><i class="bi bi-plus-circle me-1"></i>Ajouter</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Éditer Client -->
    <div class="modal fade" id="editClientModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Modifier le Client</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editClientId">
                    <div class="mb-3"><label class="form-label fw-semibold">Nom / Entreprise *</label><input type="text" class="form-control" id="editClientName" required></div>
                    <div class="mb-3"><label class="form-label fw-semibold">E-mail *</label><input type="email" class="form-control" id="editClientEmail" required></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Téléphone *</label><input type="tel" class="form-control" id="editClientPhone"></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Adresse</label><textarea class="form-control" id="editClientAddress" rows="2"></textarea></div>
                    <div id="editClientError" class="alert alert-danger d-none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" id="editClientBtn"><i class="bi bi-check-lg me-1"></i>Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmer Suppression -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Supprimer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="deleteMsg" class="mb-0">Confirmer la suppression ?</p>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn"><i class="bi bi-trash me-1"></i>Supprimer</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white border-top py-3 mt-4">
        <div class="container-fluid text-center text-muted small">© 2026 ProFacture. Tous droits réservés.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
    <script>
        let deleteTargetId = null;

        function renderClients(filter = '') {
            const clients = DB.getClients().filter(c =>
                !filter || c.nom.toLowerCase().includes(filter) || c.email.toLowerCase().includes(filter)
            );
            const el = document.getElementById('clientsTable');
            if (clients.length === 0) {
                el.innerHTML = `<div class="empty-state">
                    <i class="bi bi-people"></i>
                    <p class="mb-3">Aucun client pour l'instant</p>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addClientModal">
                        <i class="bi bi-plus-circle me-1"></i>Ajouter un client
                    </button>
                </div>`;
                return;
            }
            el.innerHTML = `<div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>Nom / Entreprise</th><th>E-mail</th><th>Téléphone</th><th>Adresse</th><th class="text-center">Actions</th></tr>
                    </thead>
                    <tbody>
                        ${clients.map(c => `<tr>
                            <td><strong>${c.nom}</strong></td>
                            <td>${c.email}</td>
                            <td>${c.telephone || '-'}</td>
                            <td>${c.adresse || '-'}</td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary me-1" onclick="openEdit('${c.id}')"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-sm btn-outline-danger" onclick="openDelete('${c.id}','${c.nom.replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>`;
        }

        function openEdit(id) {
            const c = DB.getClients().find(c => c.id === id);
            if (!c) return;
            document.getElementById('editClientId').value = c.id;
            document.getElementById('editClientName').value = c.nom;
            document.getElementById('editClientEmail').value = c.email;
            document.getElementById('editClientPhone').value = c.telephone || '';
            document.getElementById('editClientAddress').value = c.adresse || '';
            document.getElementById('editClientError').classList.add('d-none');
            new bootstrap.Modal(document.getElementById('editClientModal')).show();
        }

        function openDelete(id, nom) {
            deleteTargetId = id;
            document.getElementById('deleteMsg').textContent = `Supprimer le client "${nom}" ?`;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }

        document.getElementById('addClientBtn').addEventListener('click', function() {
            const nom = document.getElementById('clientName').value.trim();
            const email = document.getElementById('clientEmail').value.trim();
            const telephone = document.getElementById('clientPhone').value.trim();
            const adresse = document.getElementById('clientAddress').value.trim();
            const errEl = document.getElementById('addClientError');
            if (!nom || !email) { errEl.textContent = 'Nom et e-mail sont obligatoires.'; errEl.classList.remove('d-none'); return; }
            errEl.classList.add('d-none');
            DB.addClient({ nom, email, telephone, adresse });
            bootstrap.Modal.getInstance(document.getElementById('addClientModal')).hide();
            document.getElementById('clientName').value = '';
            document.getElementById('clientEmail').value = '';
            document.getElementById('clientPhone').value = '';
            document.getElementById('clientAddress').value = '';
            renderClients(document.getElementById('searchInput').value.toLowerCase());
        });

        document.getElementById('editClientBtn').addEventListener('click', function() {
            const id = document.getElementById('editClientId').value;
            const nom = document.getElementById('editClientName').value.trim();
            const email = document.getElementById('editClientEmail').value.trim();
            const telephone = document.getElementById('editClientPhone').value.trim();
            const adresse = document.getElementById('editClientAddress').value.trim();
            const errEl = document.getElementById('editClientError');
            if (!nom || !email) { errEl.textContent = 'Nom et e-mail sont obligatoires.'; errEl.classList.remove('d-none'); return; }
            errEl.classList.add('d-none');
            DB.updateClient(id, { nom, email, telephone, adresse });
            bootstrap.Modal.getInstance(document.getElementById('editClientModal')).hide();
            renderClients(document.getElementById('searchInput').value.toLowerCase());
        });

        document.getElementById('confirmDeleteBtn').addEventListener('click', function() {
            if (deleteTargetId) {
                DB.deleteClient(deleteTargetId);
                deleteTargetId = null;
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                renderClients(document.getElementById('searchInput').value.toLowerCase());
            }
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            renderClients(this.value.toLowerCase());
        });

        document.addEventListener('DOMContentLoaded', function() {
            renderClients();
        });
    </script>
    <script src="../js/libs/jspdf.umd.min.js"></script>
    <script src="../js/libs/jspdf.plugin.autotable.min.js"></script>
    <script>
        function exportClientsPDF() {
            if (!window.jspdf || !window.jspdf.jsPDF) {
                alert('Les librairies PDF ne sont pas encore chargées. Patientez quelques secondes et réessayez.');
                return;
            }
            const clients = DB.getClients();
            if (clients.length === 0) {
                alert('Aucun client à exporter.');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });
            const session = JSON.parse(localStorage.getItem('pf_session') || '{}');

            const primary = [102, 126, 234];
            const purple  = [118, 75, 162];
            const dark    = [26, 26, 46];
            const grey    = [100, 100, 100];

            // En-tête coloré
            doc.setFillColor(...primary);
            doc.rect(0, 0, 210, 38, 'F');
            doc.setFillColor(...purple);
            doc.triangle(140, 0, 210, 0, 210, 38, 'F');

            doc.setTextColor(255, 255, 255);
            doc.setFontSize(24); doc.setFont(undefined, 'bold');
            doc.text('LISTE DES CLIENTS', 14, 24);

            const now = new Date();
            const today = String(now.getDate()).padStart(2,'0') + '/' +
                          String(now.getMonth()+1).padStart(2,'0') + '/' + now.getFullYear();

            doc.setFontSize(8); doc.setFont(undefined, 'normal');
            doc.text('Edite le : ' + today, 145, 14);
            doc.text('Total : ' + clients.length + ' client(s)', 145, 21);
            if (session.companyName) doc.text(session.companyName, 145, 28);

            // Tableau
            const body = clients.map(function(c, i) {
                return [
                    String(i + 1),
                    c.nom || '-',
                    c.email || '-',
                    c.telephone || '-',
                    c.adresse || '-'
                ];
            });

            doc.autoTable({
                startY: 46,
                head: [['#', 'Nom / Entreprise', 'E-mail', 'Telephone', 'Adresse']],
                body: body,
                theme: 'grid',
                headStyles: {
                    fillColor: primary,
                    textColor: [255, 255, 255],
                    fontStyle: 'bold',
                    fontSize: 9,
                    cellPadding: 4
                },
                bodyStyles: { textColor: dark, fontSize: 8, cellPadding: 3 },
                alternateRowStyles: { fillColor: [248, 249, 255] },
                columnStyles: {
                    0: { cellWidth: 10, halign: 'center' },
                    1: { cellWidth: 45 },
                    2: { cellWidth: 52 },
                    3: { cellWidth: 35 },
                    4: { cellWidth: 48 }
                },
                margin: { left: 14, right: 14 }
            });

            // Pied de page
            doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.3);
            doc.line(14, 281, 196, 281);
            doc.setTextColor(180, 180, 180); doc.setFontSize(7.5);
            doc.text('ProFacture - Document genere automatiquement - ' + today, 105, 286, { align: 'center' });

            doc.save('Clients_ProFacture_' + today.replace(/\//g, '-') + '.pdf');
        }
    </script>
    <script src="../js/ai-assistant.js"></script>
</body>
