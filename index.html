<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFacture - Bienvenue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .welcome-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            padding: 50px 45px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .logo-wrap i { font-size: 38px; color: white; }

        .welcome-card h1 {
            font-size: 2rem;
            font-weight: 900;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .tagline {
            color: #888;
            font-size: 15px;
            margin-bottom: 36px;
        }

        .welcome-msg {
            font-size: 17px;
            color: #444;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }
        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #666;
            font-size: 13px;
        }
        .feature-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .feature-icon.blue { background: #e8edff; color: #667eea; }
        .feature-icon.green { background: #e8f5e9; color: #43a047; }
        .feature-icon.orange { background: #fff3e0; color: #f57c00; }

        .btn-connexion {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 14px;
        }
        .btn-connexion:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.45);
            color: white;
        }

        .btn-inscription {
            display: block;
            width: 100%;
            border: 2.5px solid #667eea;
            color: #667eea;
            border-radius: 12px;
            padding: 13px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.25s;
            background: transparent;
        }
        .btn-inscription:hover {
            background: #667eea;
            color: white;
        }

        .footer-text {
            color: rgba(255,255,255,0.45);
            font-size: 12px;
            margin-top: 22px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="logo-wrap">
            <i class="bi bi-file-earmark-text"></i>
        </div>
        <h1>ProFacture</h1>
        <p class="tagline">Votre espace de gestion professionnel</p>

        <p class="welcome-msg">
            Bienvenue sur <strong>ProFacture</strong> — la solution simple pour créer, gérer et suivre vos <strong>factures</strong>, <strong>devis</strong> et <strong>clients</strong>.
        </p>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon blue"><i class="bi bi-file-earmark-text"></i></div>
                Factures
            </div>
            <div class="feature-item">
                <div class="feature-icon green"><i class="bi bi-file-earmark-check"></i></div>
                Devis
            </div>
            <div class="feature-item">
                <div class="feature-icon orange"><i class="bi bi-people"></i></div>
                Clients
            </div>
        </div>

        <a href="pages/login.html" class="btn-connexion">
            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </a>
        <a href="pages/signup.html" class="btn-inscription">
            <i class="bi bi-person-plus me-2"></i>Créer un compte
        </a>
    </div>

    <p class="footer-text">© 2026 ProFacture. Tous droits réservés.</p>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
